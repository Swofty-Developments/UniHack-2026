<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AccessAtlas 3D Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0F172A; overflow: hidden; touch-action: none; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #94A3B8; font-family: -apple-system, sans-serif; font-size: 16px;
      text-align: center;
    }
    .spinner {
      width: 40px; height: 40px; border: 3px solid #334155;
      border-top-color: #2563EB; border-radius: 50%;
      animation: spin 1s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div>Loading 3D Model...</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const SEVERITY_COLORS = {
      high: 0xEF4444,
      medium: 0xF59E0B,
      low: 0x10B981,
    };

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0F172A);
    scene.fog = new THREE.Fog(0x0F172A, 15, 30);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(5, 4, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.maxPolarAngle = Math.PI * 0.85;

    // Lighting
    const ambientLight = new THREE.AmbientLight(0x404060, 0.8);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
    directionalLight.position.set(5, 10, 7);
    directionalLight.castShadow = true;
    scene.add(directionalLight);

    const fillLight = new THREE.DirectionalLight(0x4488ff, 0.4);
    fillLight.position.set(-5, 3, -5);
    scene.add(fillLight);

    // Grid
    const grid = new THREE.GridHelper(20, 40, 0x1E293B, 0x1E293B);
    scene.add(grid);

    // Floor
    const floorGeo = new THREE.PlaneGeometry(20, 20);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x151B2E, roughness: 0.9 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Demo room geometry (used when no .glb model is loaded)
    function createDemoRoom() {
      const group = new THREE.Group();
      const wallMat = new THREE.MeshStandardMaterial({ color: 0x334155, roughness: 0.7, side: THREE.DoubleSide });

      // Walls
      const wallGeo = new THREE.BoxGeometry(8, 3, 0.1);
      const backWall = new THREE.Mesh(wallGeo, wallMat);
      backWall.position.set(0, 1.5, -4);
      group.add(backWall);

      const leftWall = new THREE.Mesh(wallGeo, wallMat);
      leftWall.rotation.y = Math.PI / 2;
      leftWall.position.set(-4, 1.5, 0);
      group.add(leftWall);

      const rightWall = new THREE.Mesh(wallGeo, wallMat);
      rightWall.rotation.y = Math.PI / 2;
      rightWall.position.set(4, 1.5, 0);
      group.add(rightWall);

      // Door frame
      const doorFrame = new THREE.Mesh(
        new THREE.BoxGeometry(1.2, 2.4, 0.15),
        new THREE.MeshStandardMaterial({ color: 0x1E293B })
      );
      doorFrame.position.set(0, 1.2, 4);
      group.add(doorFrame);

      // Stairs
      const stairMat = new THREE.MeshStandardMaterial({ color: 0x475569 });
      for (let i = 0; i < 5; i++) {
        const step = new THREE.Mesh(new THREE.BoxGeometry(2, 0.2, 0.4), stairMat);
        step.position.set(-2.5, 0.1 + i * 0.2, -2 + i * 0.4);
        step.castShadow = true;
        group.add(step);
      }

      return group;
    }

    const demoRoom = createDemoRoom();
    scene.add(demoRoom);

    // Hazard pins
    const hazardPins = [];
    const hazardGroup = new THREE.Group();
    scene.add(hazardGroup);

    function createHazardPin(position, severity, label) {
      const group = new THREE.Group();

      // Cone pin
      const coneGeo = new THREE.ConeGeometry(0.15, 0.4, 8);
      const color = SEVERITY_COLORS[severity] || 0xF59E0B;
      const coneMat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.3 });
      const cone = new THREE.Mesh(coneGeo, coneMat);
      cone.position.y = 0.5;
      group.add(cone);

      // Sphere on top
      const sphereGeo = new THREE.SphereGeometry(0.12, 16, 16);
      const sphere = new THREE.Mesh(sphereGeo, coneMat);
      sphere.position.y = 0.8;
      group.add(sphere);

      // Glow ring
      const ringGeo = new THREE.RingGeometry(0.2, 0.35, 32);
      const ringMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.4, side: THREE.DoubleSide });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = -Math.PI / 2;
      ring.position.y = 0.05;
      group.add(ring);

      // Vertical line
      const lineGeo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0, 0, 0),
        new THREE.Vector3(0, 0.5, 0),
      ]);
      const lineMat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.6 });
      const line = new THREE.Line(lineGeo, lineMat);
      group.add(line);

      group.position.set(position.x, position.y, position.z);
      group.userData = { label, severity };

      return group;
    }

    function clearHazards() {
      while (hazardGroup.children.length > 0) {
        hazardGroup.remove(hazardGroup.children[0]);
      }
      hazardPins.length = 0;
    }

    function setHazards(hazards) {
      clearHazards();
      hazards.forEach(h => {
        const pin = createHazardPin(h.position, h.severity, h.type);
        hazardGroup.add(pin);
        hazardPins.push(pin);
      });
    }

    // Route path
    let routePath = null;
    function setRoute(points, color = 0x2563EB) {
      if (routePath) scene.remove(routePath);
      if (!points || points.length < 2) return;

      const curve = new THREE.CatmullRomCurve3(
        points.map(p => new THREE.Vector3(p.x, p.y, p.z))
      );
      const tubeGeo = new THREE.TubeGeometry(curve, 64, 0.05, 8, false);
      const tubeMat = new THREE.MeshStandardMaterial({
        color, emissive: color, emissiveIntensity: 0.5,
        transparent: true, opacity: 0.8,
      });
      routePath = new THREE.Mesh(tubeGeo, tubeMat);
      scene.add(routePath);
    }

    // Default route
    setRoute([
      { x: 0, y: 0.1, z: 4 },
      { x: 0, y: 0.1, z: 2 },
      { x: 1, y: 0.1, z: 0 },
      { x: 1, y: 0.1, z: -2 },
      { x: 0, y: 0.1, z: -3 },
    ]);

    // Message handling from React Native
    window.addEventListener('message', (event) => {
      try {
        const data = JSON.parse(event.data);
        switch (data.type) {
          case 'SET_HAZARDS':
            setHazards(data.hazards || []);
            break;
          case 'SET_MODEL':
            loadModel(data.url);
            break;
          case 'SET_ROUTE':
            setRoute(data.points, data.color);
            break;
          case 'CLEAR':
            clearHazards();
            if (routePath) { scene.remove(routePath); routePath = null; }
            break;
        }
      } catch {}
    });

    // Also listen on document for React Native WebView
    document.addEventListener('message', (event) => {
      try {
        const data = JSON.parse(event.data);
        switch (data.type) {
          case 'SET_HAZARDS':
            setHazards(data.hazards || []);
            break;
          case 'SET_MODEL':
            loadModel(data.url);
            break;
          case 'SET_ROUTE':
            setRoute(data.points, data.color);
            break;
          case 'CLEAR':
            clearHazards();
            if (routePath) { scene.remove(routePath); routePath = null; }
            break;
        }
      } catch {}
    });

    function loadModel(url) {
      if (!url) return;
      const loader = new GLTFLoader();
      loader.load(url, (gltf) => {
        scene.remove(demoRoom);
        const model = gltf.scene;
        model.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });
        // Auto-center and scale
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 5 / maxDim;
        model.scale.multiplyScalar(scale);
        model.position.sub(center.multiplyScalar(scale));
        scene.add(model);
        document.getElementById('loading').style.display = 'none';
      });
    }

    // Hide loading after demo room is shown
    document.getElementById('loading').style.display = 'none';

    // Notify React Native that viewer is loaded
    if (window.ReactNativeWebView) {
      window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'LOADED' }));
    }

    // Animation
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // Animate hazard pins (float up/down)
      hazardPins.forEach((pin, i) => {
        pin.children.forEach(child => {
          if (child.geometry?.type === 'SphereGeometry') {
            child.position.y = 0.8 + Math.sin(t * 2 + i) * 0.05;
          }
        });
      });

      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
