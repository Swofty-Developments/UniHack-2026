<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>AccessAtlas Monash Map</title>
  <link
    href="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.css"
    rel="stylesheet"
  />
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #d8e2dc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #map {
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at top, rgba(37, 99, 235, 0.14), transparent 34%),
        linear-gradient(180deg, #eef2ea 0%, #dbe8d7 100%);
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      background: rgba(238, 242, 234, 0.72);
      color: #0f172a;
      z-index: 5;
      transition: opacity 180ms ease;
      pointer-events: none;
    }

    #loading.hidden {
      opacity: 0;
    }

    .spinner {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 3px solid rgba(15, 23, 42, 0.12);
      border-top-color: #2563eb;
      animation: spin 0.8s linear infinite;
    }

    #axis-gizmo {
      position: absolute;
      top: 16px;
      left: 16px;
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: rgba(248, 250, 252, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.28);
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.12);
      pointer-events: none;
      z-index: 3;
    }

    .mapboxgl-ctrl-bottom-left .mapboxgl-ctrl {
      margin: 0 0 12px 12px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
    }

    .mapboxgl-ctrl-attrib {
      background: rgba(255, 255, 255, 0.88);
      color: #475569;
      border-radius: 12px;
      overflow: hidden;
    }

    .mapboxgl-ctrl-attrib a {
      color: #0f172a;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <canvas id="axis-gizmo" width="72" height="72"></canvas>
  <div id="loading">
    <div class="spinner"></div>
    <div id="loading-text">Loading Monash campus...</div>
  </div>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.js"></script>
  <script>
    (function () {
      var MAPBOX_ACCESS_TOKEN = "pk.eyJ1IjoibWF6ZW1hcCIsImEiOiJZbGRNd09zIn0.tBjK2GIzHRFzeGfOoh8P4Q";
      var MAPBOX_STYLE_URL = "mapbox://styles/mazemap/ckcacrmye4lws1ipept4x9aom";
      var MONASH_CENTER = [145.1346, -37.9137];
      var MONASH_BOUNDS = [
        [145.1255, -37.9188],
        [145.1498, -37.9034]
      ];
      var DEFAULT_STREET_BEARING = 28;
      var STREET_LEVEL_ZOOM = 18.55;
      var STREET_LEVEL_PITCH = 80;
      var PLAYER_CAMERA_PADDING = { top: 24, right: 16, bottom: 320, left: 16 };
      var PLAYER_CAMERA_OFFSET = [0, 205];
      var PLAYER_CAMERA_ALTITUDE = 6.5;
      var PLAYER_CAMERA_TRAIL_METERS = 10;
      var PLAYER_CAMERA_LOOK_AHEAD_METERS = 18;
      var HEADING_SYNC_THRESHOLD = 4;
      var POSITION_SYNC_THRESHOLD = 0.00003;

      var loadingElement = document.getElementById("loading");
      var loadingTextElement = document.getElementById("loading-text");
      var axisCanvas = document.getElementById("axis-gizmo");
      var axisContext = axisCanvas.getContext("2d");

      var state = {
        map: null,
        mapReady: false,
        interactionBound: false,
        territories: [],
        selectedTerritoryId: null,
        userLocation: null,
        hasAutoFitted: false,
        lastCameraAnchor: null
      };

      function sendMessage(payload) {
        if (!window.ReactNativeWebView) {
          return;
        }

        window.ReactNativeWebView.postMessage(JSON.stringify(payload));
      }

      function showLoading(message) {
        if (message) {
          loadingTextElement.textContent = message;
        }
        loadingElement.classList.remove("hidden");
      }

      function hideLoading() {
        loadingElement.classList.add("hidden");
      }

      function emptyFeatureCollection() {
        return { type: "FeatureCollection", features: [] };
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function normalizeColor(color) {
        return typeof color === "string" && color.trim().length > 0 ? color : "#2563eb";
      }

      function closeRing(coordinates) {
        if (!Array.isArray(coordinates) || coordinates.length < 3) {
          return [];
        }

        var ring = coordinates
          .filter(function (coordinate) {
            return (
              coordinate &&
              Number.isFinite(coordinate.longitude) &&
              Number.isFinite(coordinate.latitude)
            );
          })
          .map(function (coordinate) {
            return [coordinate.longitude, coordinate.latitude];
          });

        if (ring.length < 3) {
          return [];
        }

        var first = ring[0];
        var last = ring[ring.length - 1];
        if (first[0] !== last[0] || first[1] !== last[1]) {
          ring.push([first[0], first[1]]);
        }

        return ring;
      }

      function getExtrusionHeight(territory) {
        var area = Math.max(Number(territory.areaSqMeters || 0), 1);
        var hazards = Math.max(Number(territory.hazardTotal || 0), 0);
        var buildingBase = {
          hospital: 22,
          office: 20,
          university: 18,
          shopping: 16,
          public: 15,
          other: 14
        };
        var baseHeight = buildingBase[territory.buildingType] || buildingBase.other;
        return clamp(baseHeight + Math.sqrt(area) * 1.4 + hazards * 3.5, 12, 56);
      }

      function buildTerritoryCollections() {
        var polygonFeatures = state.territories
          .map(function (territory) {
            var ring = closeRing(
              territory &&
                territory.polygon &&
                Array.isArray(territory.polygon.coordinates)
                ? territory.polygon.coordinates
                : []
            );

            if (ring.length < 4) {
              return null;
            }

            return {
              type: "Feature",
              geometry: {
                type: "Polygon",
                coordinates: [ring]
              },
              properties: {
                id: territory.id,
                name: territory.name,
                color: normalizeColor(territory.fillColor),
                height: getExtrusionHeight(territory),
                selected: territory.id === state.selectedTerritoryId
              }
            };
          })
          .filter(Boolean);

        var centerFeatures = state.territories
          .filter(function (territory) {
            return (
              territory &&
              territory.center &&
              Number.isFinite(territory.center.longitude) &&
              Number.isFinite(territory.center.latitude)
            );
          })
          .map(function (territory) {
            return {
              type: "Feature",
              geometry: {
                type: "Point",
                coordinates: [territory.center.longitude, territory.center.latitude]
              },
              properties: {
                id: territory.id,
                name: territory.name,
                color: normalizeColor(territory.fillColor),
                selected: territory.id === state.selectedTerritoryId
              }
            };
          });

        return {
          polygons: {
            type: "FeatureCollection",
            features: polygonFeatures
          },
          centers: {
            type: "FeatureCollection",
            features: centerFeatures
          }
        };
      }

      function buildUserLocationCollection() {
        if (!state.userLocation) {
          return emptyFeatureCollection();
        }

        return {
          type: "FeatureCollection",
          features: [
            {
              type: "Feature",
              geometry: {
                type: "Point",
                coordinates: [state.userLocation.longitude, state.userLocation.latitude]
              }
            }
          ]
        };
      }

      function upsertSourceData(sourceId, data) {
        if (!state.mapReady || !state.map) {
          return;
        }

        var source = state.map.getSource(sourceId);
        if (source && typeof source.setData === "function") {
          source.setData(data);
        }
      }

      function updateTerritorySources() {
        var collections = buildTerritoryCollections();
        upsertSourceData("territories", collections.polygons);
        upsertSourceData("territory-centers", collections.centers);
      }

      function updateUserLocationSource() {
        upsertSourceData("user-location", buildUserLocationCollection());
      }

      function getCampusPadding() {
        return PLAYER_CAMERA_PADDING;
      }

      function getHeadingDelta(left, right) {
        if (!Number.isFinite(left) || !Number.isFinite(right)) {
          return Infinity;
        }

        var difference = Math.abs(left - right) % 360;
        return difference > 180 ? 360 - difference : difference;
      }

      function getPositionDelta(left, right) {
        if (!left || !right) {
          return Infinity;
        }

        return Math.max(
          Math.abs((left.longitude || 0) - (right.longitude || 0)),
          Math.abs((left.latitude || 0) - (right.latitude || 0))
        );
      }

      function getCameraBearing(location) {
        if (
          location &&
          typeof location.heading === "number" &&
          !Number.isNaN(location.heading) &&
          Math.abs(location.heading) > 1
        ) {
          return location.heading;
        }

        if (state.map) {
          var currentBearing = state.map.getBearing();
          if (Number.isFinite(currentBearing)) {
            return currentBearing;
          }
        }

        return DEFAULT_STREET_BEARING;
      }

      function getAnchorLocation() {
        if (state.userLocation) {
          return state.userLocation;
        }

        return {
          longitude: MONASH_CENTER[0],
          latitude: MONASH_CENTER[1],
          heading: DEFAULT_STREET_BEARING
        };
      }

      function getStreetCameraOptions(anchor, overrides) {
        var config = overrides || {};
        return {
          center: [anchor.longitude, anchor.latitude],
          zoom: config.zoom || STREET_LEVEL_ZOOM,
          pitch: config.pitch || STREET_LEVEL_PITCH,
          bearing: typeof config.bearing === "number" ? config.bearing : getCameraBearing(anchor),
          padding: config.padding || getCampusPadding(),
          offset: config.offset || PLAYER_CAMERA_OFFSET,
          duration: typeof config.duration === "number" ? config.duration : 780,
          essential: true
        };
      }

      function offsetCoordinate(origin, distanceMeters, bearingDegrees) {
        var radians = (bearingDegrees * Math.PI) / 180;
        var latitudeDelta = (Math.cos(radians) * distanceMeters) / 111320;
        var longitudeDelta =
          (Math.sin(radians) * distanceMeters) /
          (111320 * Math.max(Math.cos((origin.latitude * Math.PI) / 180), 0.00001));

        return {
          latitude: origin.latitude + latitudeDelta,
          longitude: origin.longitude + longitudeDelta
        };
      }

      function shouldSyncPlayerCamera(anchor, force) {
        if (force || !state.lastCameraAnchor) {
          return true;
        }

        return (
          getHeadingDelta(state.lastCameraAnchor.heading, anchor.heading) >= HEADING_SYNC_THRESHOLD ||
          getPositionDelta(state.lastCameraAnchor, anchor) >= POSITION_SYNC_THRESHOLD
        );
      }

      function syncPlayerCamera(anchor, overrides) {
        if (!state.mapReady || !state.map || !anchor) {
          return;
        }

        var config = overrides || {};
        var resolvedHeading =
          typeof config.heading === "number" ? config.heading : getCameraBearing(anchor);

        if (
          !shouldSyncPlayerCamera(
            {
              longitude: anchor.longitude,
              latitude: anchor.latitude,
              heading: resolvedHeading
            },
            !!config.force
          )
        ) {
          return;
        }

        var trailMeters =
          typeof config.trailingMeters === "number"
            ? config.trailingMeters
            : PLAYER_CAMERA_TRAIL_METERS;
        var lookAheadMeters =
          typeof config.lookAheadMeters === "number"
            ? config.lookAheadMeters
            : PLAYER_CAMERA_LOOK_AHEAD_METERS;
        var altitude =
          typeof config.altitude === "number" ? config.altitude : PLAYER_CAMERA_ALTITUDE;
        var eyePoint =
          config.eyePoint || offsetCoordinate(anchor, trailMeters, resolvedHeading + 180);
        var lookAtPoint =
          config.lookAtPoint || offsetCoordinate(anchor, lookAheadMeters, resolvedHeading);
        var freeCamera = state.map.getFreeCameraOptions();

        freeCamera.position = mapboxgl.MercatorCoordinate.fromLngLat(
          [eyePoint.longitude, eyePoint.latitude],
          altitude
        );
        freeCamera.lookAtPoint([lookAtPoint.longitude, lookAtPoint.latitude]);
        state.map.setFreeCameraOptions(freeCamera);
        state.lastCameraAnchor = {
          longitude: anchor.longitude,
          latitude: anchor.latitude,
          heading: resolvedHeading
        };
      }

      function getFirstLabelLayerId() {
        if (!state.map || !state.map.getStyle()) {
          return null;
        }

        var layers = state.map.getStyle().layers || [];
        for (var i = 0; i < layers.length; i += 1) {
          var layer = layers[i];
          if (layer.type === "symbol" && layer.layout && layer.layout["text-field"]) {
            return layer.id;
          }
        }

        return null;
      }

      function addCampusBuildingsLayer() {
        if (!state.map || !state.map.getSource("composite") || state.map.getLayer("campus-building-3d")) {
          return;
        }

        var beforeId = getFirstLabelLayerId();

        state.map.addLayer(
          {
            id: "campus-building-3d",
            type: "fill-extrusion",
            source: "composite",
            "source-layer": "building",
            minzoom: 15,
            filter: [
              "all",
              ["==", ["geometry-type"], "Polygon"],
              ["!=", ["get", "underground"], "true"]
            ],
            paint: {
              "fill-extrusion-color": [
                "interpolate",
                ["linear"],
                ["coalesce", ["to-number", ["get", "height"]], 0],
                0, "#ddd6ce",
                16, "#cbd5e1",
                36, "#94a3b8",
                72, "#64748b"
              ],
              "fill-extrusion-height": [
                "interpolate",
                ["linear"],
                ["zoom"],
                15,
                0,
                15.2,
                ["coalesce", ["to-number", ["get", "height"]], 10]
              ],
              "fill-extrusion-base": [
                "interpolate",
                ["linear"],
                ["zoom"],
                15,
                0,
                15.2,
                ["coalesce", ["to-number", ["get", "min_height"]], 0]
              ],
              "fill-extrusion-opacity": 0.74,
              "fill-extrusion-vertical-gradient": true
            }
          },
          beforeId || undefined
        );
      }

      function setLayerVisibility(layerId, visibility) {
        if (!state.map || !state.map.getLayer(layerId)) {
          return;
        }

        try {
          state.map.setLayoutProperty(layerId, "visibility", visibility);
        } catch (_error) {
          return;
        }
      }

      function setLayerPaint(layerId, property, value) {
        if (!state.map || !state.map.getLayer(layerId)) {
          return;
        }

        try {
          state.map.setPaintProperty(layerId, property, value);
        } catch (_error) {
          return;
        }
      }

      function applyGameLikeLook() {
        if (!state.map) {
          return;
        }

        var layers = state.map.getStyle().layers || [];
        layers.forEach(function (layer) {
          var id = layer.id || "";
          var sourceLayer = layer["source-layer"] || "";

          if (layer.type === "symbol") {
            setLayerVisibility(id, "none");
            return;
          }

          if (sourceLayer === "building" && (layer.type === "fill" || layer.type === "line")) {
            setLayerVisibility(id, "none");
            return;
          }

          if (sourceLayer === "landuse" || sourceLayer === "landcover" || sourceLayer === "landuse_overlay") {
            if (layer.type === "fill") {
              setLayerPaint(id, "fill-color", [
                "match",
                ["get", "class"],
                "park", "#9fd58c",
                "pitch", "#9fd58c",
                "school", "#d7efcf",
                "hospital", "#f3ead0",
                "#dcefd1"
              ]);
              setLayerPaint(id, "fill-opacity", 0.9);
            }
          }

          if (sourceLayer === "water") {
            if (layer.type === "fill") {
              setLayerPaint(id, "fill-color", "#8fd0ff");
            }
          }

          if (sourceLayer === "waterway") {
            if (layer.type === "line") {
              setLayerPaint(id, "line-color", "#7cc7ff");
              setLayerPaint(id, "line-opacity", 0.75);
            }
          }

          if (layer.type === "background") {
            setLayerPaint(id, "background-color", "#d8edd0");
          }

          if (sourceLayer === "road" && layer.type === "line") {
            setLayerPaint(id, "line-color", [
              "match",
              ["get", "class"],
              "motorway", "#f5f7fb",
              "trunk", "#f5f7fb",
              "primary", "#ffffff",
              "secondary", "#f8fafc",
              "tertiary", "#f8fafc",
              "path", "#fefce8",
              "pedestrian", "#fefce8",
              "service", "#eef2f7",
              "#eef2f7"
            ]);
            setLayerPaint(id, "line-opacity", [
              "match",
              ["get", "class"],
              "path", 0.85,
              "pedestrian", 0.85,
              0.58
            ]);
          }

          if (sourceLayer === "structure" && layer.type === "fill") {
            setLayerPaint(id, "fill-color", "#e8f3df");
          }
        });

        if (typeof state.map.setFog === "function") {
          state.map.setFog({
            color: "rgba(222, 243, 213, 0.7)",
            "high-color": "rgba(191, 219, 254, 0.26)",
            "space-color": "#d8edd0",
            "horizon-blend": 0.08
          });
        }
      }

      function ensureSourcesAndLayers() {
        if (!state.map) {
          return;
        }

        if (!state.map.getSource("territories")) {
          state.map.addSource("territories", {
            type: "geojson",
            data: emptyFeatureCollection()
          });
        }

        if (!state.map.getSource("territory-centers")) {
          state.map.addSource("territory-centers", {
            type: "geojson",
            data: emptyFeatureCollection()
          });
        }

        if (!state.map.getSource("user-location")) {
          state.map.addSource("user-location", {
            type: "geojson",
            data: emptyFeatureCollection()
          });
        }

        var beforeId = getFirstLabelLayerId();

        if (!state.map.getLayer("territory-footprints")) {
          state.map.addLayer(
            {
              id: "territory-footprints",
              type: "fill",
              source: "territories",
              paint: {
                "fill-color": ["coalesce", ["get", "color"], "#2563eb"],
                "fill-opacity": [
                  "case",
                  ["boolean", ["get", "selected"], false],
                  0.18,
                  0.1
                ]
              }
            },
            beforeId || undefined
          );
        }

        if (!state.map.getLayer("territory-extrusions")) {
          state.map.addLayer(
            {
              id: "territory-extrusions",
              type: "fill-extrusion",
              source: "territories",
              minzoom: 15,
              paint: {
                "fill-extrusion-color": [
                  "case",
                  ["boolean", ["get", "selected"], false],
                  "#bfdbfe",
                  ["coalesce", ["get", "color"], "#2563eb"]
                ],
                "fill-extrusion-height": ["get", "height"],
                "fill-extrusion-base": 0,
                "fill-extrusion-opacity": [
                  "case",
                  ["boolean", ["get", "selected"], false],
                  0.95,
                  0.82
                ],
                "fill-extrusion-vertical-gradient": true
              }
            },
            beforeId || undefined
          );
        }

        if (!state.map.getLayer("territory-outline")) {
          state.map.addLayer(
            {
              id: "territory-outline",
              type: "line",
              source: "territories",
              paint: {
                "line-color": [
                  "case",
                  ["boolean", ["get", "selected"], false],
                  "#eff6ff",
                  ["coalesce", ["get", "color"], "#2563eb"]
                ],
                "line-width": [
                  "case",
                  ["boolean", ["get", "selected"], false],
                  2.4,
                  1.4
                ],
                "line-opacity": 0.9
              }
            },
            beforeId || undefined
          );
        }

        if (!state.map.getLayer("territory-marker-glow")) {
          state.map.addLayer(
            {
              id: "territory-marker-glow",
              type: "circle",
              source: "territory-centers",
              paint: {
                "circle-color": ["coalesce", ["get", "color"], "#2563eb"],
                "circle-radius": [
                  "interpolate",
                  ["linear"],
                  ["zoom"],
                  15, 9,
                  17, 14,
                  19, 18
                ],
                "circle-opacity": 0.16,
                "circle-blur": 0.7
              }
            },
            beforeId || undefined
          );
        }

        if (!state.map.getLayer("territory-markers")) {
          state.map.addLayer(
            {
              id: "territory-markers",
              type: "circle",
              source: "territory-centers",
              paint: {
                "circle-color": [
                  "case",
                  ["boolean", ["get", "selected"], false],
                  "#ffffff",
                  ["coalesce", ["get", "color"], "#2563eb"]
                ],
                "circle-stroke-color": [
                  "case",
                  ["boolean", ["get", "selected"], false],
                  "#1d4ed8",
                  "#f8fafc"
                ],
                "circle-stroke-width": [
                  "case",
                  ["boolean", ["get", "selected"], false],
                  3,
                  1.5
                ],
                "circle-radius": [
                  "interpolate",
                  ["linear"],
                  ["zoom"],
                  15, 4.5,
                  17, 6,
                  19, 8
                ]
              }
            },
            beforeId || undefined
          );
        }

        if (!state.map.getLayer("user-location-halo")) {
          state.map.addLayer(
            {
              id: "user-location-halo",
              type: "circle",
              source: "user-location",
              paint: {
                "circle-color": "#0ea5e9",
                "circle-radius": 16,
                "circle-opacity": 0.22,
                "circle-blur": 0.55
              }
            },
            beforeId || undefined
          );
        }

        if (!state.map.getLayer("user-location-core")) {
          state.map.addLayer(
            {
              id: "user-location-core",
              type: "circle",
              source: "user-location",
              paint: {
                "circle-color": "#ffffff",
                "circle-stroke-color": "#0ea5e9",
                "circle-stroke-width": 3,
                "circle-radius": 6.5
              }
            },
            beforeId || undefined
          );
        }
      }

      function fitToCampusData(force) {
        if (!state.mapReady || !state.map) {
          return;
        }

        if (state.hasAutoFitted && !force) {
          return;
        }

        var anchor = getAnchorLocation();
        syncPlayerCamera(anchor, {
          force: true,
          heading: getCameraBearing(anchor),
          trailingMeters: PLAYER_CAMERA_TRAIL_METERS,
          lookAheadMeters: PLAYER_CAMERA_LOOK_AHEAD_METERS,
          altitude: PLAYER_CAMERA_ALTITUDE
        });
        state.hasAutoFitted = true;
      }

      function focusTerritory(territoryId) {
        if (!state.mapReady || !state.map || !territoryId) {
          return;
        }

        var territory = state.territories.find(function (item) {
          return item.id === territoryId;
        });

        if (!territory || !territory.center) {
          return;
        }

        var focusAnchor = {
          longitude: territory.center.longitude,
          latitude: territory.center.latitude,
          heading: state.userLocation ? state.userLocation.heading : DEFAULT_STREET_BEARING
        };

        syncPlayerCamera(focusAnchor, {
          force: true,
          heading: getCameraBearing(state.userLocation),
          trailingMeters: 14,
          lookAheadMeters: 6,
          altitude: 9,
          lookAtPoint: {
            longitude: territory.center.longitude,
            latitude: territory.center.latitude
          }
        });
      }

      function focusUserLocation() {
        if (!state.mapReady || !state.map || !state.userLocation) {
          return;
        }

        syncPlayerCamera(state.userLocation, {
          force: true,
          heading: getCameraBearing(state.userLocation),
          trailingMeters: PLAYER_CAMERA_TRAIL_METERS,
          lookAheadMeters: PLAYER_CAMERA_LOOK_AHEAD_METERS,
          altitude: PLAYER_CAMERA_ALTITUDE
        });
      }

      function setSelectedTerritory(territoryId, options) {
        var config = options || {};
        var nextId = territoryId || null;
        state.selectedTerritoryId = nextId;
        updateTerritorySources();

        if (nextId) {
          focusTerritory(nextId);
          if (config.notify !== false) {
            sendMessage({ type: "SELECT_TERRITORY", territoryId: nextId });
          }
          return;
        }

        if (config.fitToWorld !== false) {
          fitToCampusData(true);
        }

        if (config.notify !== false) {
          sendMessage({ type: "CLEAR_SELECTION" });
        }
      }

      function renderAxisGizmo() {
        if (!axisContext) {
          return;
        }

        axisContext.clearRect(0, 0, axisCanvas.width, axisCanvas.height);
        axisContext.fillStyle = "rgba(248, 250, 252, 0.82)";
        axisContext.fillRect(0, 0, axisCanvas.width, axisCanvas.height);

        var bearing = state.map ? (state.map.getBearing() * Math.PI) / 180 : 0;
        var pitch = state.map ? (state.map.getPitch() * Math.PI) / 180 : 0;
        var centerX = axisCanvas.width * 0.5;
        var centerY = axisCanvas.height * 0.58;
        var axisLength = 20;

        function rotateVector(vector) {
          var cosYaw = Math.cos(-bearing);
          var sinYaw = Math.sin(-bearing);
          var x1 = vector.x * cosYaw - vector.z * sinYaw;
          var z1 = vector.x * sinYaw + vector.z * cosYaw;
          var cosPitch = Math.cos(pitch);
          var sinPitch = Math.sin(pitch);
          var y2 = vector.y * cosPitch - z1 * sinPitch;
          var z2 = vector.y * sinPitch + z1 * cosPitch;
          return { x: x1, y: y2, z: z2 };
        }

        var axes = [
          { label: "X", color: "#ef4444", vector: { x: 1, y: 0, z: 0 } },
          { label: "Y", color: "#10b981", vector: { x: 0, y: 1, z: 0 } },
          { label: "Z", color: "#2563eb", vector: { x: 0, y: 0, z: 1 } }
        ]
          .map(function (axis) {
            var rotated = rotateVector(axis.vector);
            return {
              label: axis.label,
              color: axis.color,
              x: centerX + rotated.x * axisLength,
              y: centerY - rotated.y * axisLength,
              depth: rotated.z
            };
          })
          .sort(function (left, right) {
            return left.depth - right.depth;
          });

        axisContext.strokeStyle = "rgba(71, 85, 105, 0.32)";
        axisContext.beginPath();
        axisContext.arc(centerX, centerY, 3.5, 0, Math.PI * 2);
        axisContext.stroke();

        axes.forEach(function (axis) {
          axisContext.strokeStyle = axis.color;
          axisContext.lineWidth = 2.4;
          axisContext.beginPath();
          axisContext.moveTo(centerX, centerY);
          axisContext.lineTo(axis.x, axis.y);
          axisContext.stroke();

          axisContext.fillStyle = axis.color;
          axisContext.font = "bold 11px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif";
          axisContext.fillText(axis.label, axis.x + 4, axis.y + 4);
        });
      }

      function registerInteractions() {
        if (!state.map || state.interactionBound) {
          return;
        }

        state.interactionBound = true;

        state.map.on("click", function (event) {
          var features = state.map.queryRenderedFeatures(event.point, {
            layers: ["territory-extrusions", "territory-markers"]
          });

          if (features.length > 0) {
            var feature = features[0];
            if (feature.properties && feature.properties.id) {
              setSelectedTerritory(String(feature.properties.id));
              return;
            }
          }

          if (state.selectedTerritoryId) {
            setSelectedTerritory(null);
          }
        });

        ["territory-extrusions", "territory-markers"].forEach(function (layerId) {
          state.map.on("mouseenter", layerId, function () {
            state.map.getCanvas().style.cursor = "pointer";
          });
          state.map.on("mouseleave", layerId, function () {
            state.map.getCanvas().style.cursor = "";
          });
        });

        ["move", "pitch", "rotate", "zoom"].forEach(function (eventName) {
          state.map.on(eventName, renderAxisGizmo);
        });
      }

      function applyPayload(payload) {
        if (!payload || !payload.type) {
          return;
        }

        if (payload.type === "SET_TERRITORIES") {
          state.territories = Array.isArray(payload.territories) ? payload.territories : [];
          if (
            state.selectedTerritoryId &&
            !state.territories.some(function (territory) {
              return territory.id === state.selectedTerritoryId;
            })
          ) {
            state.selectedTerritoryId = null;
          }
          updateTerritorySources();
          if (state.mapReady && !state.selectedTerritoryId && !state.hasAutoFitted) {
            fitToCampusData(false);
          }
          return;
        }

        if (payload.type === "SET_USER_LOCATION") {
          var hadLocation = !!state.userLocation;
          state.userLocation = payload.location || null;
          updateUserLocationSource();
          if (state.mapReady && !state.selectedTerritoryId) {
            if (!state.hasAutoFitted || !hadLocation) {
              fitToCampusData(false);
              return;
            }

            syncPlayerCamera(state.userLocation, {
              heading: getCameraBearing(state.userLocation),
              trailingMeters: PLAYER_CAMERA_TRAIL_METERS,
              lookAheadMeters: PLAYER_CAMERA_LOOK_AHEAD_METERS,
              altitude: PLAYER_CAMERA_ALTITUDE
            });
          }
          return;
        }

        if (payload.type === "SELECT_TERRITORY") {
          setSelectedTerritory(payload.territoryId, { notify: false, fitToWorld: false });
          return;
        }

        if (payload.type === "CLEAR_SELECTION") {
          setSelectedTerritory(null, { notify: false, fitToWorld: true });
          return;
        }

        if (payload.type === "FOCUS_USER_LOCATION") {
          focusUserLocation();
          return;
        }

        if (payload.type === "FIT_TO_WORLD") {
          fitToCampusData(true);
        }
      }

      function registerMessageHandlers() {
        function receiveMessage(event) {
          if (!event || !event.data) {
            return;
          }

          var payload = null;
          try {
            payload = JSON.parse(event.data);
          } catch (_error) {
            return;
          }

          applyPayload(payload);
        }

        window.addEventListener("message", receiveMessage);
        document.addEventListener("message", receiveMessage);
      }

      function createMap() {
        if (!window.mapboxgl) {
          sendMessage({ type: "MAP_ERROR", message: "Map renderer failed to load." });
          showLoading("Map renderer failed to load.");
          return;
        }

        mapboxgl.accessToken = MAPBOX_ACCESS_TOKEN;

        state.map = new mapboxgl.Map({
          container: "map",
          style: MAPBOX_STYLE_URL,
          center: MONASH_CENTER,
          zoom: 18.2,
          pitch: 79,
          bearing: DEFAULT_STREET_BEARING,
          antialias: true,
          attributionControl: false,
          maxBounds: MONASH_BOUNDS,
          minZoom: 17.5,
          maxZoom: 19.6,
          maxPitch: 80,
          renderWorldCopies: false,
          fadeDuration: 0
        });

        state.map.addControl(
          new mapboxgl.AttributionControl({ compact: true }),
          "bottom-left"
        );

        state.map.on("load", function () {
          state.mapReady = true;
          applyGameLikeLook();
          addCampusBuildingsLayer();
          ensureSourcesAndLayers();
          registerInteractions();
          updateTerritorySources();
          updateUserLocationSource();
          fitToCampusData(false);
          renderAxisGizmo();
          hideLoading();
          sendMessage({ type: "MAP_READY" });
        });

        state.map.on("error", function (event) {
          if (state.mapReady) {
            return;
          }

          var message =
            event && event.error && event.error.message
              ? event.error.message
              : "Map rendering error.";

          sendMessage({ type: "MAP_ERROR", message: message });
          showLoading(message);
        });
      }

      registerMessageHandlers();
      createMap();
    })();
  </script>
</body>
</html>
