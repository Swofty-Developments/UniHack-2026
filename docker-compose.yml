services:
  postgres:
    image: postgres:16-alpine
    container_name: accessscan-db
    environment:
      POSTGRES_USER: accessscan
      POSTGRES_PASSWORD: accessscan
      POSTGRES_DB: accessscan
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
